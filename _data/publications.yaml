# BCore Ontology ✅
- type: other
  date: "2025-11-06"
  title: "Bridge Core Ontology for Institute of Concrete Structures, Dresden University of Technology"
  contributors:
    - "T. Noack,"
    - "X. Song"
    - "J. Reimer"
    - "M. Florek"
  url: "https://w3id.org/bcore/"
  description:
    de: "Die Bridge Core Ontology (BCore) ist ein Ontologie-System, das dazu geeignet ist, eine Brückenstruktur, sowie die mit ihr verbundenen Bauteile, Baustoffe, Infrastruktur, Mediendateien, und Umgebung darzustellen."
    en: "The Bridge Core Ontology (BCore) is an ontology ecosystem that enables the represetation of a bridge structure, as well as the components, material, infrastructure, media files, and environment connected to it."

